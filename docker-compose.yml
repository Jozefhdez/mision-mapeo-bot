version: '3.8'

services:
  ollama:
    image: ollama/ollama
    container_name: mision-mapeo-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    build: .
    container_name: mision-mapeo-bot
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file: .env
    depends_on:
      - ollama
    restart: unless-stopped
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434

volumes:
  ollama_data:
